    closure -> registry -> planting protocol, then return to the owning repository
    before making meaning claims.
policy:
  allow_implicit_invocation: false
dependencies:
  tools:
  - type: mcp
    value: aoa_workspace
    description: AoA workspace orientation MCP server
    transport: stdio
  - type: mcp
    value: dionysus
    description: Dionysus seed-routing MCP server
    transport: stdio
