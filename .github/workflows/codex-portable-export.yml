name: codex-portable-export

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-validate:
    runs-on: ubuntu-latest
    env:
      AGENTSKILLS_REF: 2e8b3265237b2e5f255d6e675f89ae83be572329
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Build derived relationship surfaces
        run: python scripts/build_catalog.py

      - name: Build Codex-facing export
        run: python scripts/build_agent_skills.py --repo-root .

      - name: Build runtime seam
        run: python scripts/build_runtime_seam.py --repo-root .

      - name: Build runtime guardrails
        run: python scripts/build_runtime_guardrails.py --repo-root .

      - name: Build description-trigger eval layer
        run: python scripts/build_description_trigger_evals.py --repo-root .

      - name: Build deterministic support bundles
        run: python scripts/build_support_resources.py --repo-root .

      - name: Build tiny-router inputs
        run: python scripts/build_tiny_router_inputs.py --repo-root .

      - name: Validate export
        run: python scripts/validate_agent_skills.py --repo-root .

      - name: Validate deterministic support bundles
        run: python scripts/validate_support_resources.py --repo-root . --check-portable

      - name: Validate tiny-router inputs
        run: python scripts/validate_tiny_router_inputs.py --repo-root .

      - name: Lint trigger evals
        run: python scripts/lint_trigger_evals.py --repo-root .

      - name: Lint description-trigger evals
        run: python scripts/lint_description_trigger_evals.py --repo-root .

      - name: Lint pack profiles
        run: python scripts/lint_pack_profiles.py --repo-root .

      - name: Lint deterministic support bundles
        run: python scripts/lint_support_resources.py --repo-root .

      - name: Install skills-ref reference validator
        run: |
          git clone https://github.com/agentskills/agentskills.git /tmp/agentskills
          git -C /tmp/agentskills checkout "$AGENTSKILLS_REF"
          python -m pip install -e /tmp/agentskills/skills-ref

      - name: Validate portable export with skills-ref
        run: python scripts/run_skills_ref_validation.py --repo-root . --require-skills-ref

      - name: Contract tests
        run: |
          python -m unittest tests/test_codex_portable_contract.py
          python -m unittest tests/test_install_profiles.py
          python -m unittest tests/test_wave3_runtime_contract.py
          python -m unittest tests/test_wave4_runtime_seam_toolchain.py
          python -m unittest tests/test_wave4_runtime_session.py
          python -m unittest tests/test_wave6_runtime_guardrails_builder.py
          python -m unittest tests/test_wave6_runtime_guardrails.py
          python -m unittest tests/test_wave7_description_trigger_builder.py
          python -m unittest tests/test_wave7_skills_ref_validation.py
          python -m unittest tests/test_support_resource_bundles.py
          python -m unittest tests/test_support_resource_schemas.py
          python -m unittest tests/test_tiny_router_inputs.py

      - name: Check generated drift
        run: |
          git diff --exit-code -- \
            .agents/skills \
            generated/agent_skill_catalog.json \
            generated/agent_skill_catalog.min.json \
            generated/portable_export_map.json \
            generated/local_adapter_manifest.json \
            generated/local_adapter_manifest.min.json \
            generated/context_retention_manifest.json \
            generated/trust_policy_matrix.json \
            generated/skill_runtime_contracts.json \
            generated/skill_pack_profiles.resolved.json \
            generated/codex_config_snippets.json \
            generated/mcp_dependency_manifest.json \
            generated/runtime_discovery_index.json \
            generated/runtime_discovery_index.min.json \
            generated/runtime_disclosure_index.json \
            generated/runtime_activation_aliases.json \
            generated/runtime_tool_schemas.json \
            generated/runtime_session_contract.json \
            generated/runtime_prompt_blocks.json \
            generated/runtime_router_hints.json \
            generated/runtime_seam_manifest.json \
            generated/repo_trust_gate_manifest.json \
            generated/permission_allowlist_manifest.json \
            generated/skill_context_guard_manifest.json \
            generated/runtime_guardrail_tool_schemas.json \
            generated/runtime_guardrail_prompt_blocks.json \
            generated/runtime_guardrail_manifest.json \
            generated/skill_description_signals.json \
            generated/description_trigger_eval_cases.jsonl \
            generated/description_trigger_eval_cases.csv \
            generated/description_trigger_eval_manifest.json \
            generated/skills_ref_validation_manifest.json \
            generated/deterministic_resource_manifest.json \
            generated/support_resource_index.json \
            generated/structured_output_schema_index.json \
            generated/support_resource_bridge_map.json \
            generated/deterministic_resource_eval_cases.jsonl \
            generated/expected_existing_aoa_support_dirs.json \
            generated/tiny_router_skill_signals.json \
            generated/tiny_router_candidate_bands.json \
            generated/tiny_router_capsules.min.json \
            generated/tiny_router_eval_cases.jsonl \
            generated/tiny_router_overlay_manifest.json \
            generated/skill_bundle_index.json \
            generated/skill_bundle_index.md \
            generated/skill_graph.json \
            generated/skill_graph.md \
            examples/repo-trust-store.json \
            examples/permission-allowlist.json \
            examples/guardrailed-runtime-config.json \
            generated/release_manifest.json
