name: Release Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Release Audit
    runs-on: windows-latest
    steps:
      - name: Checkout aoa-skills
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: workspace/aoa-skills

      - name: Checkout aoa-techniques sibling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-techniques
          path: workspace/aoa-techniques
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workspace/aoa-skills
        run: python -m pip install -r requirements-dev.txt

      - name: Run review truth-sync gate
        working-directory: workspace/aoa-skills
        run: python scripts/validate_skills.py --fail-on-review-truth-sync

      - name: Run technique drift gate
        working-directory: workspace/aoa-skills
        run: python scripts/report_technique_drift.py --techniques-repo ../aoa-techniques --fail-on-drift

      - name: Run release audit
        working-directory: workspace/aoa-skills
        run: python scripts/release_check.py --include-packaging-smoke
