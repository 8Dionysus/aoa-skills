trigger_cases:
  - skill: aoa-adr-write
    case_id: adr_write_meaningful_decision
    prompt: Record a decision that changes workflow structure and has multiple plausible options, so future contributors need the rationale.
    expected: use
    required_phrases:
      - a decision changes structure, boundaries, tooling, or workflow expectations
      - future contributors will need to know why a path was chosen
  - skill: aoa-adr-write
    case_id: adr_write_tiny_obvious_change
    prompt: Add a short note for a tiny self-evident edit where the diff already explains everything.
    expected: do_not_use
    required_phrases:
      - the change is tiny and self-evident
      - the note would only restate an obvious diff with no real decision content

  - skill: aoa-core-logic-boundary
    case_id: core_logic_boundary_mixed_responsibilities
    prompt: Clarify whether reusable rules belong in the core or at the edges because a module mixes domain logic with wiring detail.
    expected: use
    required_phrases:
      - a module mixes stable rules with wiring or execution detail
      - you need to decide whether something belongs in the core or at the edges
  - skill: aoa-core-logic-boundary
    case_id: core_logic_boundary_port_adapter_case
    prompt: The core-versus-edge split is already clear; the real task is introducing a port around a concrete dependency.
    expected: do_not_use
    required_phrases:
      - the boundary is already clear and the main task is introducing a port or adapter around a concrete dependency; use `aoa-port-adapter-refactor`

  - skill: aoa-port-adapter-refactor
    case_id: port_adapter_refactor_dependency_pressure
    prompt: Introduce a seam around a concrete dependency because business logic is tightly coupled to infrastructure and testing is hard.
    expected: use
    required_phrases:
      - business or domain logic is tightly coupled to a concrete dependency
      - tests are hard to write because external concerns leak into the core logic
  - skill: aoa-port-adapter-refactor
    case_id: port_adapter_refactor_docs_ownership
    prompt: Clarify which documentation file is authoritative rather than refactoring a code dependency seam.
    expected: do_not_use
    required_phrases:
      - the main problem is clarifying repository docs or source-of-truth ownership; use `aoa-source-of-truth-check` first

  - skill: aoa-source-of-truth-check
    case_id: source_of_truth_check_authority_confusion
    prompt: Clarify which file is authoritative because several docs overlap and contributors do not know what to trust first.
    expected: use
    required_phrases:
      - a repository has several docs that may overlap or conflict
      - contributors may not know which file to trust first
      - a change touches docs, process, or operational guidance and the question is which file is authoritative
  - skill: aoa-source-of-truth-check
    case_id: source_of_truth_check_broader_policy_design
    prompt: Design a broader policy framework rather than clarifying document authority or ownership for existing files.
    expected: do_not_use
    required_phrases:
      - the main problem is broader policy design rather than document authority or ownership

  - skill: aoa-change-protocol
    case_id: change_protocol_non_trivial_change
    prompt: Update code and config for a non-trivial change with an explicit validation path.
    expected: use
    required_phrases:
      - the change affects code, config, docs, or operational surfaces in a meaningful way
      - the task benefits from an explicit plan and verification path
  - skill: aoa-change-protocol
    case_id: change_protocol_tiny_edit
    prompt: Fix a tiny wording typo with no operational consequence.
    expected: do_not_use
    required_phrases:
      - the edit is tiny and has no meaningful review or operational consequence

  - skill: aoa-tdd-slice
    case_id: tdd_slice_bounded_behavior
    prompt: Add a small behavior change that can be specified in tests before coding.
    expected: use
    required_phrases:
      - a behavior change can be expressed as tests before implementation
      - the task fits a bounded slice rather than a broad rewrite
  - skill: aoa-tdd-slice
    case_id: tdd_slice_exploratory_work
    prompt: Explore an undefined problem where the behavior is still unclear.
    expected: do_not_use
    required_phrases:
      - the task is purely exploratory and behavior is still undefined

  - skill: aoa-approval-gate-check
    case_id: approval_gate_sensitive_action
    prompt: Classify whether an operationally sensitive action can proceed under unclear authority.
    expected: use
    required_phrases:
      - a task may be destructive, operationally sensitive, or security-relevant
      - the current authority level is unclear
  - skill: aoa-approval-gate-check
    case_id: approval_gate_low_risk_task
    prompt: Handle a clearly low-risk task already bounded by an ordinary workflow.
    expected: do_not_use
    required_phrases:
      - the task is clearly low-risk and already bounded by an ordinary workflow

  - skill: aoa-contract-test
    case_id: contract_test_meaningful_boundary
    prompt: Tighten validation on a service boundary where downstream consumers rely on a stable response shape.
    expected: use
    required_phrases:
      - two modules or services interact across a meaningful boundary
      - a smoke path or interface needs a stable validation contract
  - skill: aoa-contract-test
    case_id: contract_test_purely_local_change
    prompt: Refactor a local helper with no downstream boundary or interface change.
    expected: do_not_use
    required_phrases:
      - the change is entirely local and does not affect a meaningful boundary

  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_semantic_confusion
    prompt: Clarify domain language and subsystem boundaries before coding because adjacent concepts are being mixed together.
    expected: use
    required_phrases:
      - naming is drifting or overloaded
      - the task needs a clearer boundary before coding safely
  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_tiny_local_change
    prompt: Make a tiny local edit in a file where the boundary is already obvious and no context confusion exists.
    expected: do_not_use
    required_phrases:
      - the change is tiny and fully local
  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_contract_validation_boundary
    prompt: The interface boundary is already clear; the main task is to validate the contract rather than carve contexts.
    expected: do_not_use
    required_phrases:
      - the boundary is already clear and agreed on

  - skill: aoa-property-invariants
    case_id: property_invariants_broad_rule
    prompt: Capture a rule that must hold across many inputs because example tests feel too narrow for the safety risk.
    expected: use
    required_phrases:
      - a rule should hold across many inputs or states
      - safety or correctness depends on broad input coverage
  - skill: aoa-property-invariants
    case_id: property_invariants_snapshot_preference
    prompt: Check presentation-oriented formatting where concrete examples or snapshots are clearer than property thinking.
    expected: do_not_use
    required_phrases:
      - the behavior is mostly about presentation details or narrow snapshots
  - skill: aoa-property-invariants
    case_id: property_invariants_no_real_invariant
    prompt: Explore behavior before any meaningful invariant has been identified.
    expected: do_not_use
    required_phrases:
      - no meaningful invariant is yet understood

  - skill: aoa-dry-run-first
    case_id: dry_run_first_previewable_operation
    prompt: Preview a configuration migration before applying it to a live service.
    expected: use
    required_phrases:
      - the task can be simulated, previewed, or inspected before real execution
      - the action may delete, restore, migrate, reconfigure, or otherwise alter a live surface
  - skill: aoa-dry-run-first
    case_id: dry_run_first_pure_analysis
    prompt: Analyze a proposal without approaching execution or touching a live surface.
    expected: do_not_use
    required_phrases:
      - the task is purely analytical and does not approach execution at all
  - skill: aoa-dry-run-first
    case_id: dry_run_first_authority_boundary
    prompt: Decide whether execution is authorized before choosing any preview path.
    expected: do_not_use
    required_phrases:
      - the central question is whether execution is authorized at all rather than how to preview it; use `aoa-approval-gate-check`

  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_bounded_operational_change
    prompt: Apply a bounded configuration change with explicit validation and rollback thinking on an operational surface.
    expected: use
    required_phrases:
      - the task changes infrastructure, services, configuration, orchestration, or operational surfaces
      - the task needs stronger verification and rollback thinking than a normal code edit
  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_authority_boundary
    prompt: First decide whether enough authority exists before any operational action proceeds.
    expected: do_not_use
    required_phrases:
      - the main question is whether authority exists at all; use `aoa-approval-gate-check`
  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_preview_boundary
    prompt: The main decision is how to preview a risky operational action before any real execution.
    expected: do_not_use
    required_phrases:
      - the main need is to prefer or interpret a preview path before execution; use `aoa-dry-run-first`

  - skill: aoa-sanitized-share
    case_id: sanitized_share_sensitive_material
    prompt: Prepare logs and diagnostics for a broader audience without leaking secrets or private topology.
    expected: use
    required_phrases:
      - logs, configs, diagnostics, reports, or examples may contain sensitive details
      - a result needs to be shared publicly or with a broader audience
      - raw material may reveal secrets, topology, internal identifiers, or unsafe context
  - skill: aoa-sanitized-share
    case_id: sanitized_share_already_public_safe
    prompt: Share a short public-safe snippet that is already minimal and contains no sensitive context.
    expected: do_not_use
    required_phrases:
      - the material is already clearly public-safe and minimal
  - skill: aoa-sanitized-share
    case_id: sanitized_share_authority_boundary
    prompt: Decide whether a sensitive action should be allowed before thinking about what might be shared later.
    expected: do_not_use
    required_phrases:
      - the main task is deciding whether the underlying action should be allowed; use `aoa-approval-gate-check`
  - skill: aoa-sanitized-share
    case_id: sanitized_share_execution_boundary
    prompt: Choose how to preview or execute an operational change rather than preparing a safe shareable artifact.
    expected: do_not_use
    required_phrases:
      - the task is to preview or execute the operational change itself; use `aoa-dry-run-first` or `aoa-safe-infra-change`

