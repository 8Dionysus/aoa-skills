trigger_cases:
  - skill: aoa-adr-write
    case_id: adr_write_meaningful_decision
    prompt: Record a decision that changes workflow structure and has multiple plausible options, so future contributors need the rationale.
    expected: use
    required_phrases:
      - a decision changes structure, boundaries, tooling, or workflow expectations
      - future contributors will need to know why a path was chosen
  - skill: aoa-adr-write
    case_id: adr_write_tiny_obvious_change
    prompt: Add a short note for a tiny self-evident edit where the diff already explains everything.
    expected: do_not_use
    required_phrases:
      - the change is tiny and self-evident
      - the note would only restate an obvious diff with no real decision content

  - skill: aoa-core-logic-boundary
    case_id: core_logic_boundary_mixed_responsibilities
    prompt: Clarify whether reusable rules belong in the core or at the edges because a module mixes domain logic with wiring detail.
    expected: use
    required_phrases:
      - a module mixes stable rules with wiring or execution detail
      - you need to decide whether something belongs in the core or at the edges
  - skill: aoa-core-logic-boundary
    case_id: core_logic_boundary_port_adapter_case
    prompt: The core-versus-edge split is already clear; the real task is introducing a port around a concrete dependency.
    expected: do_not_use
    required_phrases:
      - the boundary is already clear and the main task is introducing a port or adapter around a concrete dependency; use `aoa-port-adapter-refactor`

  - skill: aoa-port-adapter-refactor
    case_id: port_adapter_refactor_dependency_pressure
    prompt: Introduce a seam around a concrete dependency because business logic is tightly coupled to infrastructure and testing is hard.
    expected: use
    required_phrases:
      - business or domain logic is tightly coupled to a concrete dependency
      - tests are hard to write because external concerns leak into the core logic
  - skill: aoa-port-adapter-refactor
    case_id: port_adapter_refactor_docs_ownership
    prompt: Clarify which documentation file is authoritative rather than refactoring a code dependency seam.
    expected: do_not_use
    required_phrases:
      - the main problem is clarifying repository docs or source-of-truth ownership; use `aoa-source-of-truth-check` first

  - skill: aoa-source-of-truth-check
    case_id: source_of_truth_check_authority_confusion
    prompt: Clarify which file is authoritative because several docs overlap, and keep top-level status docs short and link-driven once canonical homes already exist.
    expected: use
    required_phrases:
      - a repository has several docs that may overlap or conflict
      - contributors may not know which file to trust first
      - a change touches docs, process, or operational guidance and the question is which file is authoritative
      - top-level status docs such as `README` or `MANIFEST` are accumulating status/history that should live in canonical homes instead
      - the repository already has canonical detail surfaces and the summary docs should stay short, navigable, and link-driven
  - skill: aoa-source-of-truth-check
    case_id: source_of_truth_check_broader_policy_design
    prompt: Design a broader policy framework for a repository that does not yet have canonical homes for status or history detail.
    expected: do_not_use
    required_phrases:
      - the main problem is broader policy design rather than document authority or ownership
      - the task is only about building or maintaining a derived docs surface; that belongs in a separate review-surface workflow
  - skill: atm10-source-of-truth-check
    case_id: atm10_source_of_truth_local_authority
    prompt: Clarify which repo-relative atm10 docs are authoritative for one local workflow because overview docs and canonical guides are drifting apart.
    expected: use
    required_phrases:
      - the base `aoa-source-of-truth-check` workflow is already correct, but an `atm10-*` repo needs local canonical-file patterns, repo-relative docs, or doc review rules
      - confusion exists between overview docs and authoritative files inside one local repo
  - skill: atm10-source-of-truth-check
    case_id: atm10_source_of_truth_code_only_change
    prompt: Make a code-only change that has no meaningful documentation ambiguity or source-of-truth question.
    expected: do_not_use
    required_phrases:
      - the main need is broader policy design rather than local document authority mapping
      - the task is purely code-local and has no meaningful docs or guidance ambiguity

  - skill: aoa-change-protocol
    case_id: change_protocol_non_trivial_change
    prompt: Update code and config for a non-trivial change with an explicit validation path.
    expected: use
    required_phrases:
      - the change affects code, config, docs, or operational surfaces in a meaningful way
      - the task benefits from an explicit plan and verification path
  - skill: aoa-change-protocol
    case_id: change_protocol_tiny_edit
    prompt: Fix a tiny wording typo with no operational consequence.
    expected: do_not_use
    required_phrases:
      - the edit is tiny and has no meaningful review or operational consequence
  - skill: atm10-change-protocol
    case_id: atm10_change_protocol_local_overlay
    prompt: Apply a bounded non-trivial change in an atm10 repository where local files, commands, and approval notes still need to be named explicitly.
    expected: use
    required_phrases:
      - the base `aoa-change-protocol` workflow is already correct, but an `atm10-*` repo needs repo-relative paths, commands, or local approval notes
      - a bounded non-trivial change still needs an explicit plan and verification path inside the local repo
  - skill: atm10-change-protocol
    case_id: atm10_change_protocol_broader_playbook
    prompt: Run a broader family scenario that needs cross-repo coordination rather than a thin local overlay.
    expected: do_not_use
    required_phrases:
      - the task really needs a broader playbook or scenario bundle rather than a thin overlay
      - the work would introduce new upstream technique meaning instead of adapting the local repo surface
  - skill: abyss-safe-infra-change
    case_id: abyss_safe_infra_change_local_overlay
    prompt: Apply a bounded runtime or configuration change inside an abyss repository where repo-relative commands, local authority notes, and rollback checks still need to be named explicitly.
    expected: use
    required_phrases:
      - the base `aoa-safe-infra-change` workflow is already correct, but an `abyss-*` repo needs repo-relative operational surfaces, commands, or approval notes
      - the task is a bounded infrastructure, service, configuration, or operational change inside one local repo family
  - skill: abyss-safe-infra-change
    case_id: abyss_safe_infra_change_base_skill_sufficient
    prompt: Apply the normal safe infra workflow where no abyss-specific local adaptation is needed because the base skill already names everything required.
    expected: do_not_use
    required_phrases:
      - no `abyss-*` repo adaptation is needed and the base `aoa-safe-infra-change` skill is sufficient
      - the overlay would only restate the base workflow without adding a real local surface
  - skill: abyss-sanitized-share
    case_id: abyss_sanitized_share_local_surface
    prompt: Turn raw abyss incident material into a shareable artifact and place it in one repo-relative canonical location with explicit local sanitization thresholds.
    expected: use
    required_phrases:
      - the base `aoa-sanitized-share` workflow is already correct, but an `abyss-*` repo needs local sharing surfaces, repo-relative paths, or explicit sanitization thresholds
      - raw logs, diagnostics, config snippets, or incident notes from one `abyss-*` repo need a bounded public-safe or wider-shareable form
  - skill: abyss-sanitized-share
    case_id: abyss_sanitized_share_base_skill_sufficient
    prompt: Prepare a normal sanitized artifact where no abyss-specific local surface or threshold needs to be named because the base skill is already sufficient.
    expected: do_not_use
    required_phrases:
      - no `abyss-*` repo adaptation is needed and the base `aoa-sanitized-share` skill is sufficient
      - the overlay would only restate the base sanitization workflow without adding a real local sharing surface

  - skill: aoa-tdd-slice
    case_id: tdd_slice_bounded_behavior
    prompt: Add a small behavior change that can be specified in tests before coding.
    expected: use
    required_phrases:
      - a behavior change can be expressed as tests before implementation
      - the task fits a bounded slice rather than a broad rewrite
  - skill: aoa-tdd-slice
    case_id: tdd_slice_exploratory_work
    prompt: Explore an undefined problem where the behavior is still unclear.
    expected: do_not_use
    required_phrases:
      - the task is purely exploratory and behavior is still undefined

  - skill: aoa-approval-gate-check
    case_id: approval_gate_sensitive_action
    prompt: Classify whether an operationally sensitive action can proceed under unclear authority.
    expected: use
    required_phrases:
      - a task may be destructive, operationally sensitive, or security-relevant
      - the current authority level is unclear
  - skill: aoa-approval-gate-check
    case_id: approval_gate_low_risk_task
    prompt: Handle a clearly low-risk task already bounded by an ordinary workflow.
    expected: do_not_use
    required_phrases:
      - the task is clearly low-risk and already bounded by an ordinary workflow

  - skill: aoa-contract-test
    case_id: contract_test_meaningful_boundary
    prompt: Tighten validation on a service boundary where downstream consumers rely on a stable response shape.
    expected: use
    required_phrases:
      - two modules or services interact across a meaningful boundary
      - a smoke path or interface needs a stable validation contract
  - skill: aoa-contract-test
    case_id: contract_test_purely_local_change
    prompt: Refactor a local helper with no downstream boundary or interface change.
    expected: do_not_use
    required_phrases:
      - the change is entirely local and does not affect a meaningful boundary

  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_semantic_confusion
    prompt: Clarify domain language and subsystem boundaries before coding because adjacent concepts are being mixed together.
    expected: use
    required_phrases:
      - naming is drifting or overloaded
      - the task needs a clearer boundary before coding safely
  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_tiny_local_change
    prompt: Make a tiny local edit in a file where the boundary is already obvious and no context confusion exists.
    expected: do_not_use
    required_phrases:
      - the change is tiny and fully local
  - skill: aoa-bounded-context-map
    case_id: bounded_context_map_contract_validation_boundary
    prompt: The interface boundary is already clear; the main task is to validate the contract rather than carve contexts.
    expected: do_not_use
    required_phrases:
      - the boundary is already clear and agreed on

  - skill: aoa-property-invariants
    case_id: property_invariants_broad_rule
    prompt: Capture a rule that must hold across many inputs because example tests feel too narrow for the safety risk.
    expected: use
    required_phrases:
      - a rule should hold across many inputs or states
      - safety or correctness depends on broad input coverage
  - skill: aoa-property-invariants
    case_id: property_invariants_snapshot_preference
    prompt: Check presentation-oriented formatting where concrete examples or snapshots are clearer than property thinking.
    expected: do_not_use
    required_phrases:
      - the behavior is mostly about presentation details or narrow snapshots
  - skill: aoa-property-invariants
    case_id: property_invariants_no_real_invariant
    prompt: Explore behavior before any meaningful invariant has been identified.
    expected: do_not_use
    required_phrases:
      - no meaningful invariant is yet understood

  - skill: aoa-quest-harvest
    case_id: quest_harvest_repeated_reviewed_pattern
    prompt: Three reviewed quest runs keep repeating the same bounded post-session triage pattern, and we need to decide whether it should stay a quest or be promoted into skill, playbook, memo, proof, or orchestrator surfaces.
    expected: use
    required_phrases:
      - a bounded work pattern has repeated and now needs an explicit promotion decision
      - reviewed evidence exists, but the correct destination is still unclear
      - the decision must distinguish between skill, playbook, orchestrator surface, proof surface, memo surface, or staying a quest
  - skill: aoa-quest-harvest
    case_id: quest_harvest_active_single_run
    prompt: One still-active route has only an anecdotal occurrence so far, and the team is trying to invent fresh doctrine before any reviewed repeat signal exists.
    expected: do_not_use
    required_phrases:
      - the route is still active and the evidence has not been reviewed yet
      - there is only one anecdotal occurrence with no honest repeat signal
      - the task is to invent net-new doctrine rather than classify a repeated pattern

  - skill: aoa-invariant-coverage-audit
    case_id: invariant_coverage_audit_existing_surface
    prompt: Review an existing validation surface to see whether it really constrains the stable rule or only repeats examples.
    expected: use
    required_phrases:
      - an existing test or check surface needs a review for invariant strength
      - the question is whether current checks really constrain the stable rule
  - skill: aoa-invariant-coverage-audit
    case_id: invariant_coverage_audit_invariant_not_known
    prompt: Search for the invariant itself before trying to audit the coverage around it.
    expected: do_not_use
    required_phrases:
      - the invariant itself is still unknown and you need discovery work first

  - skill: aoa-dry-run-first
    case_id: dry_run_first_previewable_operation
    prompt: Preview a configuration migration before applying it to a live service.
    expected: use
    required_phrases:
      - the task can be simulated, previewed, or inspected before real execution
      - the action may delete, restore, migrate, reconfigure, or otherwise alter a live surface
  - skill: aoa-dry-run-first
    case_id: dry_run_first_pure_analysis
    prompt: Analyze a proposal without approaching execution or touching a live surface.
    expected: do_not_use
    required_phrases:
      - the task is purely analytical and does not approach execution at all
  - skill: aoa-dry-run-first
    case_id: dry_run_first_authority_boundary
    prompt: Decide whether execution is authorized before choosing any preview path.
    expected: do_not_use
    required_phrases:
      - the central question is whether execution is authorized at all rather than how to preview it; use `aoa-approval-gate-check`

  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_bounded_operational_change
    prompt: Apply a bounded configuration change with explicit validation and rollback thinking on an operational surface.
    expected: use
    required_phrases:
      - the task changes infrastructure, services, configuration, orchestration, or operational surfaces
      - the task needs stronger verification and rollback thinking than a normal code edit
  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_authority_boundary
    prompt: First decide whether enough authority exists before any operational action proceeds.
    expected: do_not_use
    required_phrases:
      - the main question is whether authority exists at all; use `aoa-approval-gate-check`
  - skill: aoa-safe-infra-change
    case_id: safe_infra_change_preview_boundary
    prompt: The main decision is how to preview a risky operational action before any real execution.
    expected: do_not_use
    required_phrases:
      - the main need is to prefer or interpret a preview path before execution; use `aoa-dry-run-first`

  - skill: aoa-local-stack-bringup
    case_id: local_stack_bringup_reviewable_runtime
    prompt: Bring up a local multi-service stack after choosing a profile that changes what starts and requires host readiness checks before launch.
